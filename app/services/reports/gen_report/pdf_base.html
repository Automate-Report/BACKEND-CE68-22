<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-Regular.ttf');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-Bold.ttf');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-Italic.ttf');
      font-weight: 400;
      font-style: italic;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-BoldItalic.ttf');
      font-weight: 700;
      font-style: italic;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-Light.ttf');
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-Medium.ttf');
      font-weight: 500;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-SemiBold.ttf');
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-ExtraBold.ttf');
      font-weight: 800;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sarabun';
      src: url('Fonts/Sarabun-Thin.ttf');
      font-weight: 100;
      font-style: normal;
    }

    @page {
      size: A4;
      margin: 28mm 20mm 22mm 20mm;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      font-weight: 400;
      font-size: 10pt;
      color: #1e1e1e;
      line-height: 1.8;
    }

    /* ===================== PAGE BREAK ===================== */
    .page-break {
      page-break-after: always;
    }

    /* ===================== COVER ===================== */
    .cover-title {
      font-size: 20pt;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .cover-subtitle {
      font-size: 12pt;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .text-center {
      text-align: center;
    }

    /* ===================== HEADINGS ===================== */
    .header1 {
      font-weight: 700;
      font-size: 13pt;
      margin: 14px 0 6px 0;
    }

    .header2 {
      font-weight: 600;
      font-size: 11pt;
      margin: 10px 0 4px 0;
    }

    .header3 {
      font-weight: 600;
      font-size: 10pt;
      margin: 8px 0 4px 0;
    }

    /* ===================== LAYOUT ===================== */
    p {
      margin-bottom: 6px;
    }

    section {
      margin-bottom: 10px;
    }

    .tab {
      margin-left: 24px;
    }

    span.tab {
      display: inline-block;
      width: 24px;
    }

    li {
      margin-left: 20px;
      margin-bottom: 4px;
      list-style-type: disc;
    }

    /* ===================== TABLE ===================== */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9pt;
      margin: 8px 0 12px 0;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 7px 10px;
      text-align: left;
    }

    thead tr {
      background-color: #f2f2f2;
      font-weight: 600;
    }

    tbody tr:nth-child(even) {
      background-color: #fafafa;
    }

    /* ===================== SEVERITY BADGES ===================== */
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 3px;
      font-weight: 600;
      font-size: 8pt;
      color: #fff;
    }

    .badge.critical {
      background: #c00000;
    }

    .badge.high {
      background: #e05c00;
    }

    .badge.medium {
      background: #e0a800;
      color: #333;
    }

    .badge.low {
      background: #2e7d32;
    }

    .badge.open {
      background: #1565c0;
    }

    .badge.mitigated {
      background: #558b2f;
    }

    .badge.in-progress {
      background: #f57c00;
      color: #333;
    }

    /* ===================== VULN BLOCK ===================== */
    .vuln-block {
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 14px;
      background: #fefefe;
    }

    .vuln-divider {
      border: none;
      border-top: 1px dashed #ddd;
      margin: 12px 0;
    }

    /* ===================== CODE ===================== */
    code {
      background: #f4f4f4;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 8.5pt;
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }

    /* ===================== IMAGE ===================== */
    .img-block {
      text-align: center;
      margin: 8px 0 10px;
    }

    .img-block img {
      max-width: 90%;
      border: 1px solid #ddd;
    }

    .evidence-img {
      max-width: 90%;
      border: 1px solid #ccc;
      display: block;
      margin: 6px auto;
    }


    /* ===================== TOC ===================== */
    .toc-table {
      margin-top: 16px;
    }

    .toc-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 5px;
      font-size: 10pt;
    }

    .toc-num {
      width: 28px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .toc-title {
      white-space: nowrap;
    }

    .toc-dots {
      flex: 1;
      margin: 0 6px 0 6px;
      min-width: 20px;
      height: 1px;
      background-image: linear-gradient(to right, #a2a2a2 50%, transparent 50%);
      background-size: 8px 0.5px;
      background-repeat: repeat-x;
    }

    .toc-page {
      width: 24px;
      text-align: right;
      color: #555;
      flex-shrink: 0;
    }

    /* ===================== COVER ===================== */
    .cover {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
  </style>
</head>

<body>
  {{ CONTENT }}
</body>

</html>
<!-- append toc styles -->
